name: Build ISO
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Fedora version of the installer'
        required: true
        default: '44'
      image_tag:
        description: 'OCI image tag to install'
        required: true
        default: 'latest'

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
  build-iso:
    name: Build Installer ISOs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - asgard-linux
          - asgard-linux-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase Registry Name
        id: registry_case
        run: |
          echo "IMAGE_REPO=${IMAGE_REGISTRY,,}" >> $GITHUB_OUTPUT

      - name: Build ISO
        id: build
        uses: jasonn3/build-container-installer@main
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ${{ steps.registry_case.outputs.IMAGE_REPO }}
          image_tag: ${{ inputs.image_tag }}
          version: ${{ inputs.version }}

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
